<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Grupo - Inteligência Artificial e Educação | Adminic</title>
    
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta property="og:title" content="Acesso ao Grupo - Inteligência Artificial e Educação">
    <meta property="og:description" content="Redirecionamento oficial para o grupo da disciplina ENS00334 - Escola do Futuro.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;  
            overflow-x: hidden;
        }
        
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 60%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); }

        /* Loader Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #e2e8f0;
            border-bottom-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        .dark .loader {
            border-color: #334155;
            border-bottom-color: #3b82f6;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glitch minimalista para manter a identidade */
        .glitch-text-sm {
            position: relative;
            display: inline-block;
        }
        .glitch-text-sm::before,
        .glitch-text-sm::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        .glitch-text-sm::before {
            color: #0ea5e9;
            z-index: -1;
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }
        .glitch-text-sm::after {
            color: #a855f7;
            z-index: -2;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#020617] dark:text-slate-200 selection:bg-blue-500/30 text-sm min-h-screen flex flex-col transition-colors duration-300">
    
    <nav class="sticky top-0 w-full z-50 border-b border-slate-200 dark:border-white/5 glass bg-white/80 dark:bg-[#0f172a]/80 transition-colors duration-300" aria-label="Navegação principal">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group focus-visible" aria-label="Adminic - Voltar à página inicial">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/20 group-hover:bg-blue-500 transition" aria-hidden="true">
                    <i class="fas fa-cube text-white text-sm"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter text-slate-900 dark:text-white uppercase group-hover:text-blue-600 transition">ADMINIC</span>
            </a>
            
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-white/10 transition text-slate-600 dark:text-slate-400 hover:text-orange-500 dark:hover:text-yellow-400 focus-visible" aria-label="Alternar tema">
                <i id="theme-icon" class="fas fa-sun"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center relative px-4 py-12" id="main-content">
        <div class="absolute inset-0 hero-gradient pointer-events-none" aria-hidden="true"></div>
        
        <div data-aos="zoom-in" class="relative z-10 max-w-md w-full">
            <div class="bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-white/10 rounded-2xl p-8 shadow-2xl backdrop-blur-sm transition-colors duration-300 text-center">
                
                <div class="inline-flex items-center gap-2 px-4 py-1.5 mb-6 text-[10px] font-bold tracking-[0.2em] text-blue-600 dark:text-blue-400 uppercase bg-blue-100/50 dark:bg-blue-500/10 border border-blue-200 dark:border-blue-500/20 rounded-full">
                    <i class="fas fa-graduation-cap"></i> ENS00334
                </div>

                <h1 class="text-2xl md:text-3xl font-extrabold mb-2 text-slate-900 dark:text-white uppercase tracking-tight">
                    IA e Educação
                </h1>
                <p class="text-slate-600 dark:text-slate-400 font-medium mb-8 text-sm">
                    Acesso ao grupo oficial da disciplina.
                </p>

                <div id="status-container" class="mb-8 h-24 flex flex-col items-center justify-center">
                    <span class="loader mb-4"></span>
                    <p class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest animate-pulse">
                        Verificando link seguro...
                    </p>
                </div>

                <div id="manual-access" class="hidden opacity-0 transition-opacity duration-500">
                    <a href="https://chat.whatsapp.com/JOIStxjtrY8B5d146UoXiX?mode=hq2tcla" 
                       class="w-full bg-green-600 hover:bg-green-500 text-white px-6 py-4 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-3 shadow-lg shadow-green-600/20 uppercase tracking-widest focus-visible">
                        <i class="fab fa-whatsapp text-lg"></i>
                        Entrar no Grupo
                    </a>
                    <p class="text-[10px] text-slate-400 mt-4 uppercase tracking-widest">
                        Caso não seja redirecionado, clique no botão acima.
                    </p>
                </div>

            </div>
            
            <div class="mt-8 text-center text-[10px] font-bold tracking-[0.2em] text-slate-500 uppercase">
                Apoio Tecnológico: <span class="glitch-text-sm" data-text="ADMINIC">ADMINIC</span>
            </div>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');
        
        function updateIcons(isDark) {
            if (themeIcon) {
                themeIcon.classList.remove('fa-sun', 'fa-moon');
                themeIcon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            updateIcons(true);
        } else {
            html.classList.remove('dark');
            updateIcons(false);
        }

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                updateIcons(false);
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                updateIcons(true);
            }
        }
    </script>
    
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Lógica de Redirecionamento
        const whatsappLink = "https://chat.whatsapp.com/JOIStxjtrY8B5d146UoXiX?mode=hq2tcla";
        
        window.addEventListener('load', () => {
            // Aguarda 2 segundos para o usuário ver a identidade visual antes de forçar a saída
            setTimeout(() => {
                // Esconde o loader e mostra o botão de fallback
                document.getElementById('status-container').classList.add('hidden');
                const manualAccess = document.getElementById('manual-access');
                manualAccess.classList.remove('hidden');
                
                // Dispara opacidade para transição suave
                setTimeout(() => {
                    manualAccess.classList.remove('opacity-0');
                    manualAccess.classList.add('opacity-100');
                }, 50);

                // Tenta o redirecionamento automático
                window.location.href = whatsappLink;
            }, 2000);
        });
    </script>
</body>
</html>
